name: check-api-types
on:
  pull_request:
    branches: [main]
jobs:
  check-api-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: API Server 기동
        run: |
          cd ${{ github.workspace }}/..
          git clone https://${{ secrets.GH_PAT }}@github.com/martin2574/cloudpersona-api-server.git
          cd cloudpersona-api-server
          npm ci
          npm run build
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3057/openapi.json > /dev/null && break
            sleep 1
          done
      - name: API 타입 최신성 검증
        run: |
          npm run gen:api
          git diff --exit-code src/types/api-types.ts
