name: quality-gate
on:
  pull_request:
    branches: [main]
jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: 린트
        run: npm run lint
      - name: 타입 검사
        run: npx tsc --noEmit
      - name: 테스트
        run: npx vitest run --exclude '**/FR-AD-007.1/**' --exclude '**/FR-AD-007.4/**'
      - name: 빌드
        run: npm run build
